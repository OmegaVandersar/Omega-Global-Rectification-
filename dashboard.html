<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Omega Global Rectification</title>
  <style>
    :root { --accent: #00ff9d; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      line-height: 1.7;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(10,10,10,0.98);
      backdrop-filter: blur(12px);
      z-index: 1000;
      padding: 18px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #222;
    }

    .logo { font-size: 1.75rem; font-weight: 600; color: var(--accent); }

    .dashboard-container {
      margin-top: 90px;
      padding: 30px 5%;
      max-width: 1280px;
      margin: 90px auto;
    }

    .balance-card {
      background: linear-gradient(135deg, #1a1a1a, #111);
      border: 2px solid var(--accent);
      border-radius: 24px;
      padding: 45px 30px;
      text-align: center;
      margin-bottom: 50px;
    }

    .balance {
      font-size: 3.8rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -2px;
      margin: 12px 0;
    }

    .gain { color: #0f0; font-size: 1.45rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 35px;
      transition: all 0.4s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-10px);
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.15rem;
      margin-top: 25px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">Omega Global</div>
    <div style="color:var(--accent); font-weight:600;">Dashboard</div>
  </nav>

  <div class="dashboard-container">
    <div class="balance-card">
      <p style="opacity:0.85;">Total Balance</p>
      <div class="balance">€48,672.34</div>
      <div class="gain">+€2,847 this week (+6.2%)</div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Active Plan</h3>
        <p style="font-size:2.1rem; margin:20px 0 8px;">Premium Plan</p>
        <p>3.5% Weekly • €12,450 invested</p>
        <button class="btn" onclick="alert('Earnings withdrawn successfully')">Withdraw Earnings</button>
      </div>

      <div class="card">
        <h3>Next Payout</h3>
        <p style="font-size:2.1rem; margin:20px 0 8px;">3 Days</p>
        <p>Estimated €436.75</p>
        <button class="btn">View History</button>
      </div>

      <div class="card">
        <h3>KYC Status</h3>
        <p style="font-size:1.8rem; color:#0f0; margin:20px 0;">✅ Verified</p>
        <p>You have full access to all features</p>
        <button class="btn" onclick="location.href='kyc.html'">Update KYC</button>
      </div>
    </div>

    <div style="text-align:center; margin-top:70px; color:#777;">
      <p>Connected Wallet: 0x71C4...a3F9</p>
      <p style="margin-top:30px;">
        Need help? <a href="support.html" style="color:var(--accent);">Support Center</a>
      </p>
    </div>
  </div>

</body>
</html>
