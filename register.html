<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Omega Global Rectification</title>
  <style>
    :root { --accent: #00ff9d; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      line-height: 1.8;
    }
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(10,10,10,0.98);
      backdrop-filter: blur(12px);
      z-index: 1000;
      padding: 18px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #222;
    }
    .logo { font-size: 1.75rem; font-weight: 600; color: var(--accent); }

    .register-container {
      max-width: 460px;
      margin: 140px auto;
      padding: 50px 35px;
      background: #1a1a1a;
      border-radius: 24px;
      border: 1px solid #333;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      background: #111;
      border: 1px solid #444;
      border-radius: 10px;
      color: white;
      font-size: 1.1rem;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.2rem;
      margin-top: 25px;
      cursor: pointer;
    }

    .btn:hover {
      transform: scale(1.03);
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">Omega Global</div>
  </nav>

  <div class="register-container">
    <h2 style="margin-bottom:30px; color:var(--accent);">Create Your Account</h2>
    
    <input type="text" placeholder="Full Name" required>
    <input type="text" placeholder="Username" required>
    <input type="email" placeholder="Email Address" required>
    <input type="password" placeholder="Create Password" required>
    <input type="tel" placeholder="Phone Number" required>

    <button class="btn" onclick="register()">Create Account</button>
    
    <p style="margin-top:25px; color:#aaa;">
      Already have an account? <a href="login.html" style="color:var(--accent);">Login here</a>
    </p>
  </div>

  <script>
    function register() {
      alert("✅ Account Created Successfully!\n\nWelcome to Omega Global Rectification.\n\nYou can now login.");
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1000);
    }
  </script>

</body>
</html>
