<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Center - Omega Global Rectification</title>
  <style>
    :root { --accent: #00ff9d; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: Arial, sans-serif; background: #0a0a0a; color: #ffffff; }
    nav {
      position: fixed; top: 0; width: 100%; background: rgba(10,10,10,0.98);
      backdrop-filter: blur(12px); z-index: 1000; padding: 18px 5%;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #222;
    }
    .logo { font-size: 1.75rem; font-weight: 600; color: var(--accent); }

    .hero {
      background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.92)), url('https://picsum.photos/id/1015/2000/1200') center/cover;
      height: 45vh; margin-top: 80px; display: flex; align-items: center; justify-content: center;
    }

    .support-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 28px;
      max-width: 1280px;
      margin: 80px auto;
      padding: 0 20px;
    }

    .support-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      transition: all 0.4s;
      cursor: pointer;
    }

    .support-card:hover {
      border-color: var(--accent);
      transform: translateY(-10px);
    }

    .support-card h3 {
      color: var(--accent);
      margin: 18px 0 12px;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">Omega Global</div>
  </nav>

  <div class="hero">
    <div>
      <h1 style="font-size:3.3rem;">Support Center</h1>
    </div>
  </div>

  <div class="support-grid">
    <div class="support-card" onclick="location.href='login.html'"><h3>Login Issues</h3><p>Trouble signing in</p></div>
    <div class="support-card" onclick="location.href='register.html'"><h3>Create Account</h3><p>Registration help</p></div>
    <div class="support-card"><h3>Claim V2</h3><p>Claiming rewards issues</p></div>
    <div class="support-card"><h3>Transaction Error</h3><p>Failed transactions</p></div>
    <div class="support-card"><h3>Wallet Connection</h3><p>Wallet related problems</p></div>
    <div class="support-card"><h3>Staking / Farm</h3><p>Staking and farming issues</p></div>
  </div>

</body>
</html>
